meters:
  - name: processor_licenses
    unit: processor
    aggregation: max
    dimensions:
      - edition
      - environment
  - name: named_user_plus_licenses
    unit: NUP
    aggregation: max
    dimensions:
      - edition
      - environment
  - name: option_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - option
      - edition
  - name: management_pack_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - pack
  - name: annual_support
    unit: USD-year
    aggregation: sum
    dimensions:
      - contract
      - edition
  - name: cloud_db_ocpu_hours
    unit: OCPU-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - byol
  - name: cloud_db_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - tier
principles:
  - name: Visibility
    description: Reconcile Oracle CSI / contract numbers against actual deployed processor counts; for
      cloud, use OCI Cost Analysis to track Database Cloud Service / Autonomous DB consumption per compartment.
  - name: Allocation
    description: Tag each licensed environment (prod, dr, test) and cloud DB instance with the consuming
      business unit; use OCI compartments to enforce allocation boundaries.
  - name: Optimization
    description: Convert under-utilized perpetual licenses to BYOL on OCI for ~70%+ savings; consolidate
      with Multitenant pluggable databases; right-size cloud DB shapes; remove unused Options and Management
      Packs (each one carries 22% support); for Autonomous DB, use Elastic Pools (up to ~87% off compute).
  - name: Accountability
    description: A named license-management owner reconciles Oracle audits and tracks LMS / certified
      processor counts; finance owns the annual support renewal. Cloud DB consumption is reviewed monthly
      against forecast.
