description: 'FOCUS-aligned FinOps for Oracle Database: perpetual per-Processor or per-Named-User-Plus
  licenses (with 22% annual support) for on-prem / self-hosted deployments, plus per-OCPU/ECPU-hour cloud-managed
  variants on OCI (license-included or BYOL). Options and Management Packs (Partitioning, Diagnostics
  Pack, Tuning Pack, etc.) are licensed separately and meaningfully drive total cost.'
