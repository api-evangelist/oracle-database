      name: database-rdf-networks-network-owner-network-name-models
      description: REST surface for database-rdf-networks-network_owner},{network_name-models.
      operations:
      - method: GET
        name: getrdfmodels
        description: Oracle Database List RDF models
        call: ords-rdf-graph.getrdfmodels
        with:
          network_owner: rest.network_owner
          network_name: rest.network_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/rdf/networks/{network-owner-network-name}/models/{model-name}/sparql/1-1
      name: database-rdf-networks-network-owner-network-name-models-model-name-sparql-1-1
      description: REST surface for database-rdf-networks-network_owner},{network_name-models-model_name-sparql-1.1.
      operations:
      - method: GET
        name: executesparqlqueryget
        description: Oracle Database Execute SPARQL query (GET)
        call: ords-rdf-graph.executesparqlqueryget
        with:
          network_owner: rest.network_owner
          network_name: rest.network_name
          model_name: rest.model_name
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: executesparqlquerypost
        description: Oracle Database Execute SPARQL query (POST)
        call: ords-rdf-graph.executesparqlquerypost
        with:
          network_owner: rest.network_owner
          network_name: rest.network_name
          model_name: rest.model_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
