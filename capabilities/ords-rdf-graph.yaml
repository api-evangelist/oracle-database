naftiko: 1.0.0-alpha2
info:
  label: Oracle Database Oracle REST Data Services (ORDS) API — RDF Graph
  description: 'Oracle Database Oracle REST Data Services (ORDS) API — RDF Graph. 6 operations. Lead operation: Oracle Database
    List all RDF networks. Self-contained Naftiko capability covering one Oracle Database business surface.'
  tags:
  - Oracle Database
  - RDF Graph
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_DATABASE_API_KEY: ORACLE_DATABASE_API_KEY
capability:
