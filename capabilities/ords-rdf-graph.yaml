  - type: http
    namespace: ords-rdf-graph
    baseUri: https://{host}:{port}/ords
    description: Oracle Database Oracle REST Data Services (ORDS) API — RDF Graph business capability. Self-contained, no
      shared references.
    resources:
    - name: database-rdf-networks
      path: /database/rdf/networks/
      operations:
      - name: getrdfnetworks
        method: GET
        description: Oracle Database List all RDF networks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-rdf-networks-network_owner},{network_name
      path: /database/rdf/networks/{network_owner},{network_name}
      operations:
      - name: getrdfnetwork
        method: GET
        description: Oracle Database Get RDF network information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: network_owner
          in: path
          type: string
          required: true
        - name: network_name
          in: path
          type: string
          required: true
      - name: createrdfnetwork
        method: PUT
        description: Oracle Database Create an RDF network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: network_owner
          in: path
          type: string
          required: true
        - name: network_name
          in: path
          type: string
          required: true
    - name: database-rdf-networks-network_owner},{network_name-models
      path: /database/rdf/networks/{network_owner},{network_name}/models/
      operations:
      - name: getrdfmodels
        method: GET
        description: Oracle Database List RDF models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: network_owner
          in: path
          type: string
          required: true
        - name: network_name
          in: path
          type: string
          required: true
    - name: database-rdf-networks-network_owner},{network_name-models-model_name-sparql-1.1
      path: /database/rdf/networks/{network_owner},{network_name}/models/{model_name}/sparql/1.1
      operations:
      - name: executesparqlqueryget
        method: GET
        description: Oracle Database Execute SPARQL query (GET)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: network_owner
          in: path
          type: string
          required: true
        - name: network_name
          in: path
          type: string
          required: true
        - name: model_name
          in: path
          type: string
          required: true
        - name: query
          in: query
          type: string
          description: The SPARQL query string
          required: true
      - name: executesparqlquerypost
        method: POST
        description: Oracle Database Execute SPARQL query (POST)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: network_owner
          in: path
          type: string
          required: true
        - name: network_name
          in: path
          type: string
          required: true
        - name: model_name
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_DATABASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ords-rdf-graph-rest
    port: 8080
    description: REST adapter for Oracle Database Oracle REST Data Services (ORDS) API — RDF Graph. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/database/rdf/networks
      name: database-rdf-networks
      description: REST surface for database-rdf-networks.
      operations:
      - method: GET
        name: getrdfnetworks
        description: Oracle Database List all RDF networks
        call: ords-rdf-graph.getrdfnetworks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/rdf/networks/{network-owner-network-name}
      name: database-rdf-networks-network-owner-network-name
      description: REST surface for database-rdf-networks-network_owner},{network_name.
      operations:
      - method: GET
        name: getrdfnetwork
        description: Oracle Database Get RDF network information
        call: ords-rdf-graph.getrdfnetwork
        with:
          network_owner: rest.network_owner
          network_name: rest.network_name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: createrdfnetwork
        description: Oracle Database Create an RDF network
        call: ords-rdf-graph.createrdfnetwork
        with:
          network_owner: rest.network_owner
          network_name: rest.network_name
        outputParameters:
        - type: object
          mapping: $.
