    description: Oracle Database Oracle REST Data Services (ORDS) API — Monitoring business capability. Self-contained, no
      shared references.
    resources:
    - name: database-monitoring-alerts
      path: /database/monitoring/alerts/
      operations:
      - name: getalerts
        method: GET
        description: Oracle Database Get all alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-monitoring-alerts_summaries-by_message_level
      path: /database/monitoring/alerts_summaries/by_message_level
      operations:
      - name: getalertsummaries
