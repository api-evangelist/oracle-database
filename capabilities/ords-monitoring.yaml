naftiko: 1.0.0-alpha2
info:
  label: Oracle Database Oracle REST Data Services (ORDS) API — Monitoring
  description: 'Oracle Database Oracle REST Data Services (ORDS) API — Monitoring. 10 operations. Lead operation: Oracle Database
    Get all alerts. Self-contained Naftiko capability covering one Oracle Database business surface.'
  tags:
