naftiko: 1.0.0-alpha2
info:
  label: Oracle Database Oracle REST Data Services (ORDS) API
  description: 'Oracle Database Oracle REST Data Services (ORDS) API. 14 operations. Lead operation: Oracle Database Get all
    database components. Self-contained Naftiko capability covering one Oracle Database business surface.'
  tags:
  - Oracle Database
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_DATABASE_API_KEY: ORACLE_DATABASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ords-general
    baseUri: https://{host}:{port}/ords
    description: Oracle Database Oracle REST Data Services (ORDS) API business capability. Self-contained, no shared references.
    resources:
    - name: database-components
      path: /database/components/
      operations:
      - name: getdatabasecomponents
        method: GET
        description: Oracle Database Get all database components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-feature_usage
      path: /database/feature_usage/
      operations:
      - name: getfeatureusage
        method: GET
        description: Oracle Database Get feature usage statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-parameters
      path: /database/parameters/
      operations:
      - name: getdatabaseparameters
        method: GET
        description: Oracle Database Get all database parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-parameters-name
      path: /database/parameters/{name}
      operations:
      - name: getdatabaseparameter
        method: GET
        description: Oracle Database Get a specific database parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the database parameter
          required: true
    - name: database-security-users
      path: /database/security/users/
      operations:
      - name: getdatabaseusers
        method: GET
        description: Oracle Database Get all database users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-sessionless-transactions
      path: /database/sessionless-transactions/
      operations:
      - name: startsessionlesstransaction
        method: POST
        description: Oracle Database Start a sessionless transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-sessionless-transactions-sessionlessTransactionID
      path: /database/sessionless-transactions/{sessionlessTransactionID}
      operations:
      - name: commitsessionlesstransaction
        method: PUT
        description: Oracle Database Commit a sessionless transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionlessTransactionID
          in: path
          type: string
          required: true
      - name: rollbacksessionlesstransaction
        method: DELETE
        description: Oracle Database Rollback a sessionless transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionlessTransactionID
          in: path
          type: string
          required: true
    - name: database-status
      path: /database/status
      operations:
      - name: getdatabasestatus
        method: GET
        description: Oracle Database Get database status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-storage-bytes
      path: /database/storage/bytes
      operations:
      - name: getstoragebytes
        method: GET
        description: Oracle Database Get storage usage in bytes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-storage-tablespaces
      path: /database/storage/tablespaces/
      operations:
      - name: gettablespaces
        method: GET
        description: Oracle Database Get all tablespaces storage information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-storage-tablespaces-tablespace_name
      path: /database/storage/tablespaces/{tablespace_name}/
      operations:
      - name: gettablespace
        method: GET
        description: Oracle Database Get tablespace details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tablespace_name
          in: path
          type: string
          required: true
    - name: database-storage-tablespaces-tablespace_name-datafiles
      path: /database/storage/tablespaces/{tablespace_name}/datafiles/
      operations:
      - name: getdatafiles
        method: GET
        description: Oracle Database Get tablespace datafiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tablespace_name
          in: path
          type: string
          required: true
    - name: database-version
      path: /database/version
      operations:
      - name: getdatabaseversion
        method: GET
        description: Oracle Database Get database version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ORACLE_DATABASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ords-general-rest
    port: 8080
    description: REST adapter for Oracle Database Oracle REST Data Services (ORDS) API. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/database/components
      name: database-components
      description: REST surface for database-components.
      operations:
      - method: GET
        name: getdatabasecomponents
        description: Oracle Database Get all database components
        call: ords-general.getdatabasecomponents
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/feature-usage
      name: database-feature-usage
      description: REST surface for database-feature_usage.
      operations:
      - method: GET
        name: getfeatureusage
        description: Oracle Database Get feature usage statistics
        call: ords-general.getfeatureusage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/parameters
      name: database-parameters
      description: REST surface for database-parameters.
      operations:
      - method: GET
        name: getdatabaseparameters
        description: Oracle Database Get all database parameters
        call: ords-general.getdatabaseparameters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/parameters/{name}
      name: database-parameters-name
      description: REST surface for database-parameters-name.
      operations:
      - method: GET
        name: getdatabaseparameter
        description: Oracle Database Get a specific database parameter
        call: ords-general.getdatabaseparameter
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/security/users
      name: database-security-users
      description: REST surface for database-security-users.
      operations:
      - method: GET
        name: getdatabaseusers
        description: Oracle Database Get all database users
        call: ords-general.getdatabaseusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/sessionless-transactions
      name: database-sessionless-transactions
      description: REST surface for database-sessionless-transactions.
      operations:
      - method: POST
        name: startsessionlesstransaction
        description: Oracle Database Start a sessionless transaction
        call: ords-general.startsessionlesstransaction
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/sessionless-transactions/{sessionlesstransactionid}
      name: database-sessionless-transactions-sessionlesstransactionid
      description: REST surface for database-sessionless-transactions-sessionlessTransactionID.
      operations:
      - method: PUT
        name: commitsessionlesstransaction
        description: Oracle Database Commit a sessionless transaction
        call: ords-general.commitsessionlesstransaction
        with:
          sessionlessTransactionID: rest.sessionlessTransactionID
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: rollbacksessionlesstransaction
        description: Oracle Database Rollback a sessionless transaction
        call: ords-general.rollbacksessionlesstransaction
        with:
          sessionlessTransactionID: rest.sessionlessTransactionID
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/status
      name: database-status
      description: REST surface for database-status.
      operations:
      - method: GET
        name: getdatabasestatus
        description: Oracle Database Get database status
        call: ords-general.getdatabasestatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/storage/bytes
      name: database-storage-bytes
      description: REST surface for database-storage-bytes.
      operations:
      - method: GET
        name: getstoragebytes
        description: Oracle Database Get storage usage in bytes
        call: ords-general.getstoragebytes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/storage/tablespaces
      name: database-storage-tablespaces
      description: REST surface for database-storage-tablespaces.
      operations:
      - method: GET
        name: gettablespaces
        description: Oracle Database Get all tablespaces storage information
        call: ords-general.gettablespaces
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/storage/tablespaces/{tablespace-name}
      name: database-storage-tablespaces-tablespace-name
      description: REST surface for database-storage-tablespaces-tablespace_name.
      operations:
      - method: GET
        name: gettablespace
        description: Oracle Database Get tablespace details
        call: ords-general.gettablespace
        with:
          tablespace_name: rest.tablespace_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/storage/tablespaces/{tablespace-name}/datafiles
      name: database-storage-tablespaces-tablespace-name-datafiles
      description: REST surface for database-storage-tablespaces-tablespace_name-datafiles.
      operations:
      - method: GET
        name: getdatafiles
        description: Oracle Database Get tablespace datafiles
        call: ords-general.getdatafiles
        with:
          tablespace_name: rest.tablespace_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/version
      name: database-version
      description: REST surface for database-version.
      operations:
      - method: GET
        name: getdatabaseversion
        description: Oracle Database Get database version
        call: ords-general.getdatabaseversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ords-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Database Oracle REST Data Services (ORDS) API. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: oracle-database-get-all-database
      description: Oracle Database Get all database components
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-general.getdatabasecomponents
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-database-get-feature-usage
      description: Oracle Database Get feature usage statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-general.getfeatureusage
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-database-get-all-database-2
      description: Oracle Database Get all database parameters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-general.getdatabaseparameters
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-database-get-specific-database
      description: Oracle Database Get a specific database parameter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-general.getdatabaseparameter
