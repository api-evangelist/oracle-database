      - type: object
        mapping: $.
    - name: oracle-database-start-sessionless-transaction
      description: Oracle Database Start a sessionless transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ords-general.startsessionlesstransaction
      outputParameters:
      - type: object
