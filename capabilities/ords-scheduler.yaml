naftiko: 1.0.0-alpha2
info:
  label: Oracle Database Oracle REST Data Services (ORDS) API — Scheduler
  description: 'Oracle Database Oracle REST Data Services (ORDS) API — Scheduler. 2 operations. Lead operation: Oracle Database
    Get all scheduler jobs. Self-contained Naftiko capability covering one Oracle Database business surface.'
  tags:
  - Oracle Database
  - Scheduler
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_DATABASE_API_KEY: ORACLE_DATABASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ords-scheduler
    baseUri: https://{host}:{port}/ords
    description: Oracle Database Oracle REST Data Services (ORDS) API — Scheduler business capability. Self-contained, no
      shared references.
    resources:
    - name: database-scheduler-jobs
      path: /database/scheduler/jobs/
      operations:
      - name: getschedulerjobs
        method: GET
        description: Oracle Database Get all scheduler jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-scheduler-jobs-owner},{job_name
      path: /database/scheduler/jobs/{owner},{job_name}
      operations:
      - name: getschedulerjob
        method: GET
        description: Oracle Database Get a specific scheduler job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          required: true
        - name: job_name
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_DATABASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ords-scheduler-rest
    port: 8080
    description: REST adapter for Oracle Database Oracle REST Data Services (ORDS) API — Scheduler. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/database/scheduler/jobs
      name: database-scheduler-jobs
      description: REST surface for database-scheduler-jobs.
      operations:
      - method: GET
        name: getschedulerjobs
        description: Oracle Database Get all scheduler jobs
        call: ords-scheduler.getschedulerjobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/scheduler/jobs/{owner-job-name}
      name: database-scheduler-jobs-owner-job-name
      description: REST surface for database-scheduler-jobs-owner},{job_name.
      operations:
      - method: GET
        name: getschedulerjob
        description: Oracle Database Get a specific scheduler job
        call: ords-scheduler.getschedulerjob
        with:
          owner: rest.owner
          job_name: rest.job_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ords-scheduler-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Database Oracle REST Data Services (ORDS) API — Scheduler. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: oracle-database-get-all-scheduler
      description: Oracle Database Get all scheduler jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-scheduler.getschedulerjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-database-get-specific-scheduler
      description: Oracle Database Get a specific scheduler job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ords-scheduler.getschedulerjob
      with:
        owner: tools.owner
        job_name: tools.job_name
      outputParameters:
      - type: object
        mapping: $.
