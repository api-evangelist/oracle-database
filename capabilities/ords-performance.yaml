          in: path
          type: string
          required: true
    - name: database-performance-sql_statements-sql_id-history
      path: /database/performance/sql_statements/{sql_id}/history
      operations:
      - name: getsqlhistory
        method: GET
        description: Oracle Database Get SQL statement history
