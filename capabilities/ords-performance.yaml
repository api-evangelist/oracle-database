    description: Oracle Database Oracle REST Data Services (ORDS) API — Performance business capability. Self-contained, no
      shared references.
    resources:
    - name: database-performance-active_sessions_history
      path: /database/performance/active_sessions_history/
      operations:
      - name: getactivesessionshistory
        method: GET
        description: Oracle Database Get active sessions history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: database-performance-active_sessions_history_waits
      path: /database/performance/active_sessions_history_waits/
      operations:
      - name: getactivesessionshistorywaits
        method: GET
        description: Oracle Database Get active session history waits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
