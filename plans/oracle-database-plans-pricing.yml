specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Database
providerId: oracle-database
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Database
  - Enterprise
  - Oracle
  - SQL
description: Oracle Database is sold under perpetual or term software licenses with two main metrics
  — per-Processor and per-Named-User-Plus (NUP). Public list prices come from Oracle's Technology Price
  List; Enterprise discounting is common. Free editions exist (XE — Express Edition); cloud-managed alternatives
  (Autonomous Database, Database Cloud Service) are billed per-OCPU/ECPU-hour on OCI. NUP minimums apply
  (25 NUP per processor on Enterprise Edition). Annual support is typically 22% of license list price.
sources:
  - https://www.oracle.com/database/pricing/
  - https://www.oracle.com/assets/technology-price-list-070617.pdf
  - https://www.oracle.com/database/free/
plans:
  - id: oracle-database-xe
    name: Express Edition (XE)
    type: freemium
    description: Free, redistributable edition of Oracle Database with capacity caps. Useful for development,
      learning, and small embedded deployments.
    entries:
      - label: XE license
        name: xe_license
        type: flat
        metric: install
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 12 GB user data
      - name: Up to 2 GB RAM, 2 CPU threads
      - name: No per-user / per-app limit (within capacity caps)
  - id: oracle-database-se2-processor
    name: Standard Edition 2 — per Processor
    type: subscription
    description: Mid-tier edition with full SQL, partitioning replaced by simpler features. Per-Processor
      perpetual license; capacity capped at 16 threads.
    entries:
      - label: SE2 per Processor
        name: se2_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '17500.00'
        userMultiplied: false
      - label: SE2 annual support
        name: se2_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: ~22% of license
        userMultiplied: false
    elements:
      - name: Capped at 16 threads
      - name: Includes RAC (legacy 19c only)
      - name: 22% annual support
  - id: oracle-database-se2-nup
    name: Standard Edition 2 — Named User Plus
    type: subscription
    description: Per-NUP licensing for SE2; minimum 10 NUP per server.
    entries:
      - label: SE2 NUP
        name: se2_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '350.00'
        userMultiplied: true
    elements:
      - name: 10 NUP minimum per server
  - id: oracle-database-ee-processor
    name: Enterprise Edition — per Processor
    type: subscription
    description: Flagship edition with full feature set; per-Processor perpetual license. Options (Partitioning,
      Active Data Guard, Diagnostics Pack, etc.) are licensed separately.
    entries:
      - label: EE per Processor
        name: ee_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '47500.00'
        userMultiplied: false
      - label: EE annual support
        name: ee_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: ~22% of license
        userMultiplied: false
    elements:
      - name: Full feature catalog
      - name: Add-on Options and Management Packs sold separately
      - name: 22% annual support
  - id: oracle-database-ee-nup
    name: Enterprise Edition — Named User Plus
    type: subscription
    description: Per-NUP perpetual license; 25 NUP minimum per processor.
    entries:
      - label: EE NUP
        name: ee_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '950.00'
        userMultiplied: true
    elements:
      - name: 25 NUP minimum per processor
      - name: NUP cheaper than processor metric for low user counts
  - id: oracle-database-cloud
    name: Database Cloud Service (OCI)
    type: usage-based
    description: Per-OCPU- or per-ECPU-hour cloud-managed Oracle Database (Base Database Service, ExaDB,
      Autonomous Database). License-Included or BYOL variants.
    entries:
      - label: Database Cloud OCPU (license-included)
        name: db_cloud_ocpu_license
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
      - label: Database Cloud OCPU (BYOL)
        name: db_cloud_ocpu_byol
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
    elements:
      - name: Pay-as-you-go on OCI
      - name: BYOL discount available
      - name: Backups, patching, HA included
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
