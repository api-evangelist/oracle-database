openapi: 3.1.0
info:
  title: Oracle REST Data Services (ORDS) API
  description: >-
    RESTful API for Oracle Database management, monitoring, and data access
    through Oracle REST Data Services. Provides 300+ endpoints across 17
    categories including database administration, performance monitoring,
    Data Guard management, Data Pump operations, pluggable database lifecycle,
    APEX management, RDF graph operations, and transactional event queues.
  version: 25.4.0
  contact:
    name: Oracle Support
    url: https://support.oracle.com
    email: support@oracle.com
  license:
    name: Oracle Technology Network License
    url: https://www.oracle.com/downloads/licenses/standard-license.html
  termsOfService: https://www.oracle.com/legal/terms.html
externalDocs:
  description: ORDS REST API Documentation
  url: https://docs.oracle.com/en/database/oracle/oracle-rest-data-services/25.4/orrst/
servers:
  - url: https://{host}:{port}/ords
    description: ORDS Server
    variables:
      host:
        default: localhost
        description: ORDS server hostname
      port:
        default: '8443'
        description: ORDS server port
security:
  - oauth2: []
  - basicAuth: []
tags:
  - name: General
    description: Core database instance status, version, and configuration services
  - name: Data Dictionary
    description: Database tables, views, columns, indexes, and object metadata
  - name: Monitoring
    description: Database session monitoring, locks, alerts, and wait metrics
  - name: Performance
    description: SQL performance analysis, execution plans, and active session history
  - name: Pluggable Databases
    description: PDB lifecycle management for multitenant environments
  - name: PDB Snapshots
    description: PDB snapshot carousel management
  - name: Data Guard
    description: Oracle Data Guard broker configuration and database management
  - name: Data Pump
    description: High-speed data and metadata export/import operations
  - name: Data Tools
    description: Data loading, cloud storage links, and survey operations
  - name: REST Services
    description: Custom REST API module, handler, and OAuth management
  - name: Scheduler
    description: Oracle Scheduler job management
  - name: APEX
    description: Oracle APEX workspace and application management
  - name: RDF Graph
    description: Knowledge graph management using W3C RDF, OWL, and SPARQL standards
  - name: Transactional Event Queues
    description: Message queue and event streaming services
  - name: Open Service Broker
    description: Open Service Broker API compliant service provisioning
  - name: Environment
    description: Oracle Home and DBCA database creation services
paths:
  /database/status:
    get:
      operationId: getDatabaseStatus
      summary: Get database status
      description: Returns the current status of the Oracle Database instance.
      tags:
        - General
      responses:
        '200':
          description: Database status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/version:
    get:
      operationId: getDatabaseVersion
      summary: Get database version
      description: Returns the version information of the Oracle Database instance.
      tags:
        - General
      responses:
        '200':
          description: Database version retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/components/:
    get:
      operationId: getDatabaseComponents
      summary: Get all database components
      description: Returns a list of all installed database components and their status.
      tags:
        - General
      responses:
        '200':
          description: Components retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/parameters/:
    get:
      operationId: getDatabaseParameters
      summary: Get all database parameters
      description: Returns all database initialization parameters and their current values.
      tags:
        - General
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Parameters retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParameterList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/parameters/{name}:
    get:
      operationId: getDatabaseParameter
      summary: Get a specific database parameter
      description: Returns the value and metadata for a specific database parameter.
      tags:
        - General
      parameters:
        - name: name
          in: path
          required: true
          description: The name of the database parameter
          schema:
            type: string
      responses:
        '200':
          description: Parameter retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseParameter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/security/users/:
    get:
      operationId: getDatabaseUsers
      summary: Get all database users
      description: Returns a list of all database users and their properties.
      tags:
        - General
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/storage/bytes:
    get:
      operationId: getStorageBytes
      summary: Get storage usage in bytes
      description: Returns the total storage usage of the database in bytes.
      tags:
        - General
      responses:
        '200':
          description: Storage information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/storage/tablespaces/:
    get:
      operationId: getTablespaces
      summary: Get all tablespaces storage information
      description: Returns storage information for all tablespaces.
      tags:
        - General
      responses:
        '200':
          description: Tablespace storage information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TablespaceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/storage/tablespaces/{tablespace_name}/:
    get:
      operationId: getTablespace
      summary: Get tablespace details
      description: Returns detailed storage information for a specific tablespace.
      tags:
        - General
      parameters:
        - name: tablespace_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tablespace details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tablespace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/storage/tablespaces/{tablespace_name}/datafiles/:
    get:
      operationId: getDatafiles
      summary: Get tablespace datafiles
      description: Returns datafiles associated with a specific tablespace.
      tags:
        - General
      parameters:
        - name: tablespace_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datafiles retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatafileList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/feature_usage/:
    get:
      operationId: getFeatureUsage
      summary: Get feature usage statistics
      description: Returns usage statistics for database features.
      tags:
        - General
      responses:
        '200':
          description: Feature usage retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureUsageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/sessionless-transactions/:
    post:
      operationId: startSessionlessTransaction
      summary: Start a sessionless transaction
      description: Starts a new sessionless transaction and returns its identifier.
      tags:
        - General
      responses:
        '201':
          description: Transaction started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionlessTransaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/sessionless-transactions/{sessionlessTransactionID}:
    put:
      operationId: commitSessionlessTransaction
      summary: Commit a sessionless transaction
      description: Commits the specified sessionless transaction.
      tags:
        - General
      parameters:
        - name: sessionlessTransactionID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction committed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: rollbackSessionlessTransaction
      summary: Rollback a sessionless transaction
      description: Rolls back the specified sessionless transaction.
      tags:
        - General
      parameters:
        - name: sessionlessTransactionID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction rolled back successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/objects/tables/:
    get:
      operationId: getTables
      summary: Get all tables
      description: Returns metadata for all database tables accessible to the current user.
      tags:
        - Data Dictionary
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Tables retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/objects/tables/{owner},{table_name}:
    get:
      operationId: getTable
      summary: Get a specific table
      description: Returns metadata for a specific database table.
      tags:
        - Data Dictionary
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: table_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Table metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/objects/columns/:
    get:
      operationId: getColumns
      summary: Get all table columns
      description: Returns column metadata for all tables.
      tags:
        - Data Dictionary
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Columns retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/objects/columns/{owner},{table_name},{column_name}:
    get:
      operationId: getColumn
      summary: Get a specific column
      description: Returns metadata for a specific table column.
      tags:
        - Data Dictionary
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: column_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Column metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/objects/indexes/:
    get:
      operationId: getIndexes
      summary: Get all indexes
      description: Returns metadata for all database indexes.
      tags:
        - Data Dictionary
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Indexes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/objects/indexes/{owner},{index_name}:
    get:
      operationId: getIndex
      summary: Get a specific index
      description: Returns metadata for a specific database index.
      tags:
        - Data Dictionary
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: index_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Index metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/objects/functions/:
    get:
      operationId: getFunctions
      summary: Get all functions
      description: Returns metadata for all database functions.
      tags:
        - Data Dictionary
      responses:
        '200':
          description: Functions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/objects/functions/{object_id}:
    get:
      operationId: getFunction
      summary: Get a specific function
      description: Returns metadata for a specific database function.
      tags:
        - Data Dictionary
      parameters:
        - name: object_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Function metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/objects/foreign_keys/:
    get:
      operationId: getForeignKeys
      summary: Get all foreign keys
      description: Returns metadata for all foreign key constraints.
      tags:
        - Data Dictionary
      responses:
        '200':
          description: Foreign keys retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForeignKeyList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/db_links/:
    get:
      operationId: getDatabaseLinks
      summary: Get all database links
      description: Returns metadata for all database links.
      tags:
        - Data Dictionary
      responses:
        '200':
          description: Database links retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseLinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/db_links/{owner},{db_link}:
    get:
      operationId: getDatabaseLink
      summary: Get a specific database link
      description: Returns metadata for a specific database link.
      tags:
        - Data Dictionary
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: db_link
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database link retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseLink'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/tablespaces/:
    get:
      operationId: getTablespacesDict
      summary: Get all tablespaces
      description: Returns data dictionary information for all tablespaces.
      tags:
        - Data Dictionary
      responses:
        '200':
          description: Tablespaces retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TablespaceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/sessions/:
    get:
      operationId: getSessions
      summary: Get all sessions
      description: Returns information about all active database sessions.
      tags:
        - Monitoring
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Sessions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/sessions/{sid},{serial_number}/:
    get:
      operationId: getSession
      summary: Get a specific session
      description: Returns detailed information about a specific database session.
      tags:
        - Monitoring
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: integer
        - name: serial_number
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Session details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /database/monitoring/session_locks/:
    get:
      operationId: getSessionLocks
      summary: Get all session locks
      description: Returns information about all current session locks.
      tags:
        - Monitoring
      responses:
        '200':
          description: Session locks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLockList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/session_locks/holding/:
    get:
      operationId: getBlockingLocks
      summary: Get blocking locks
      description: Returns information about sessions holding locks that block others.
      tags:
        - Monitoring
      responses:
        '200':
          description: Blocking locks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLockList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/session_locks/waiting/:
    get:
      operationId: getWaitingLocks
      summary: Get waiting locks
      description: Returns information about sessions waiting to acquire locks.
      tags:
        - Monitoring
      responses:
        '200':
          description: Waiting locks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLockList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/alerts/:
    get:
      operationId: getAlerts
      summary: Get all alerts
      description: Returns all database alerts and notifications.
      tags:
        - Monitoring
      responses:
        '200':
          description: Alerts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/alerts_summaries/by_message_level:
    get:
      operationId: getAlertSummaries
      summary: Get alert summaries by message level
      description: Returns alert summary statistics grouped by message level.
      tags:
        - Monitoring
      responses:
        '200':
          description: Alert summaries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /database/monitoring/wait_class_metrics:
    get:
      operationId: getWaitClassMetrics
      summary: Get wait class metrics
