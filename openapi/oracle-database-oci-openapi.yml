openapi: 3.1.0
info:
  title: Oracle Cloud Infrastructure Database API
  description: >-
    API for managing Oracle Database services in Oracle Cloud Infrastructure (OCI).
    Provides management of DB Systems, Autonomous Databases, Exadata infrastructure,
    database backups, Data Guard associations, database homes, and related cloud
    database resources.
  version: '20160918'
  contact:
    name: Oracle Cloud Support
    url: https://support.oracle.com
    email: cloud-support@oracle.com
  license:
    name: Oracle Cloud Infrastructure Terms
    url: https://www.oracle.com/cloud/free/oci-terms.html
  termsOfService: https://www.oracle.com/legal/terms.html
externalDocs:
  description: OCI Database Service API Documentation
  url: https://docs.oracle.com/iaas/api/#/en/database/20160918/
servers:
  - url: https://database.{region}.oraclecloud.com/20160918
    description: OCI Database Service Regional Endpoint
    variables:
      region:
        default: us-ashburn-1
        description: OCI region identifier
        enum:
          - us-ashburn-1
          - us-phoenix-1
          - eu-frankfurt-1
          - uk-london-1
          - ap-tokyo-1
          - ap-mumbai-1
          - ca-toronto-1
          - ap-sydney-1
          - sa-saopaulo-1
          - ap-seoul-1
security:
  - ociSignature: []
tags:
  - name: Autonomous Databases
    description: Manage Oracle Autonomous Database instances
  - name: DB Systems
    description: Manage Oracle Database Cloud Service DB Systems
  - name: Databases
    description: Manage databases within DB Systems
  - name: Database Homes
    description: Manage Oracle Database Home directories
  - name: Backups
    description: Manage database backups
  - name: Data Guard
    description: Manage Data Guard associations for high availability
  - name: Exadata Infrastructure
    description: Manage Exadata Cloud Infrastructure
  - name: VM Clusters
    description: Manage VM clusters on Exadata infrastructure
  - name: Pluggable Databases
    description: Manage pluggable databases in multitenant architecture
  - name: Key Stores
    description: Manage key stores for TDE encryption
paths:
  /autonomousDatabases:
    get:
      operationId: listAutonomousDatabases
      summary: List Autonomous Databases
      description: >-
        Returns a list of Autonomous Databases in the specified compartment.
        Results can be filtered by display name, lifecycle state, and other parameters.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/compartmentIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
        - name: displayName
          in: query
          description: Filter by display name
          schema:
            type: string
        - name: lifecycleState
          in: query
          description: Filter by lifecycle state
          schema:
            type: string
            enum:
              - PROVISIONING
              - AVAILABLE
              - STOPPING
              - STOPPED
              - STARTING
              - TERMINATING
              - TERMINATED
              - UNAVAILABLE
              - RESTORE_IN_PROGRESS
              - BACKUP_IN_PROGRESS
              - SCALE_IN_PROGRESS
              - UPDATING
              - MAINTENANCE_IN_PROGRESS
        - name: dbWorkload
          in: query
          description: Filter by workload type
          schema:
            type: string
            enum:
              - OLTP
              - DW
              - AJD
              - APEX
      responses:
        '200':
          description: Autonomous Databases listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutonomousDatabaseSummary'
          headers:
            opc-next-page:
              description: Pagination token for next page
              schema:
                type: string
            opc-request-id:
              description: Unique request identifier
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createAutonomousDatabase
      summary: Create an Autonomous Database
      description: >-
        Creates a new Autonomous Database with the specified configuration.
        Supports OLTP, Data Warehouse, JSON Database, and APEX workload types.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/opcRetryTokenParam'
        - $ref: '#/components/parameters/opcRequestIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutonomousDatabaseDetails'
      responses:
        '200':
          description: Autonomous Database creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
          headers:
            etag:
              description: Entity tag for optimistic concurrency
              schema:
                type: string
            opc-work-request-id:
              description: Work request identifier for tracking
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /autonomousDatabases/{autonomousDatabaseId}:
    get:
      operationId: getAutonomousDatabase
      summary: Get an Autonomous Database
      description: Returns details about the specified Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
      responses:
        '200':
          description: Autonomous Database details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAutonomousDatabase
      summary: Update an Autonomous Database
      description: >-
        Updates the specified Autonomous Database. Supports scaling CPU,
        storage, and other configuration changes.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAutonomousDatabaseDetails'
      responses:
        '200':
          description: Autonomous Database update initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAutonomousDatabase
      summary: Delete an Autonomous Database
      description: Terminates and deletes the specified Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Delete request accepted
          headers:
            opc-work-request-id:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autonomousDatabases/{autonomousDatabaseId}/actions/start:
    post:
      operationId: startAutonomousDatabase
      summary: Start an Autonomous Database
      description: Starts a stopped Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '200':
          description: Start initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autonomousDatabases/{autonomousDatabaseId}/actions/stop:
    post:
      operationId: stopAutonomousDatabase
      summary: Stop an Autonomous Database
      description: Stops a running Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '200':
          description: Stop initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autonomousDatabases/{autonomousDatabaseId}/actions/restart:
    post:
      operationId: restartAutonomousDatabase
      summary: Restart an Autonomous Database
      description: Restarts the specified Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '200':
          description: Restart initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autonomousDatabases/{autonomousDatabaseId}/actions/generateWallet:
    post:
      operationId: generateAutonomousDatabaseWallet
      summary: Generate database wallet
      description: >-
        Creates and downloads a wallet zip file containing credentials
        for connecting to the Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - $ref: '#/components/parameters/autonomousDatabaseIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateAutonomousDatabaseWalletDetails'
      responses:
        '200':
          description: Wallet generated successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autonomousDatabaseBackups:
    get:
      operationId: listAutonomousDatabaseBackups
      summary: List Autonomous Database backups
      description: Returns a list of backups for the specified Autonomous Database.
      tags:
        - Autonomous Databases
      parameters:
        - name: autonomousDatabaseId
          in: query
          description: The Autonomous Database OCID
          schema:
            type: string
        - $ref: '#/components/parameters/compartmentIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Backups listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutonomousDatabaseBackupSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAutonomousDatabaseBackup
      summary: Create an Autonomous Database backup
      description: Creates a new manual backup for the specified Autonomous Database.
      tags:
        - Autonomous Databases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutonomousDatabaseBackupDetails'
      responses:
        '200':
          description: Backup creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousDatabaseBackup'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /dbSystems:
    get:
      operationId: listDbSystems
      summary: List DB Systems
      description: Returns a list of DB Systems in the specified compartment.
      tags:
        - DB Systems
      parameters:
        - $ref: '#/components/parameters/compartmentIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
        - name: displayName
          in: query
          schema:
            type: string
        - name: lifecycleState
          in: query
          schema:
            type: string
            enum:
              - PROVISIONING
              - AVAILABLE
              - UPDATING
              - TERMINATING
              - TERMINATED
              - FAILED
              - MIGRATED
      responses:
        '200':
          description: DB Systems listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DbSystemSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: launchDbSystem
      summary: Launch a DB System
      description: >-
        Creates and launches a new DB System with the specified configuration.
        This is a long-running operation tracked via work requests.
      tags:
        - DB Systems
      parameters:
        - $ref: '#/components/parameters/opcRetryTokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaunchDbSystemDetails'
      responses:
        '200':
          description: DB System launch initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbSystem'
          headers:
            opc-work-request-id:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /dbSystems/{dbSystemId}:
    get:
      operationId: getDbSystem
      summary: Get a DB System
      description: Returns details about the specified DB System.
      tags:
        - DB Systems
      parameters:
        - $ref: '#/components/parameters/dbSystemIdParam'
      responses:
        '200':
          description: DB System details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateDbSystem
      summary: Update a DB System
      description: Updates the specified DB System configuration.
      tags:
        - DB Systems
      parameters:
        - $ref: '#/components/parameters/dbSystemIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDbSystemDetails'
      responses:
        '200':
          description: DB System update initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: terminateDbSystem
      summary: Terminate a DB System
      description: Terminates and deletes the specified DB System.
      tags:
        - DB Systems
      parameters:
        - $ref: '#/components/parameters/dbSystemIdParam'
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Termination accepted
          headers:
            opc-work-request-id:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /databases:
    get:
      operationId: listDatabases
      summary: List databases
      description: >-
        Returns a list of databases in the specified compartment
        or DB System.
      tags:
        - Databases
      parameters:
        - $ref: '#/components/parameters/compartmentIdParam'
        - name: dbHomeId
          in: query
          schema:
            type: string
        - name: systemId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Databases listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatabaseSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createDatabase
      summary: Create a database
      description: Creates a new database in the specified DB Home.
      tags:
        - Databases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatabaseDetails'
      responses:
        '200':
          description: Database creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /databases/{databaseId}:
    get:
      operationId: getDatabase
      summary: Get a database
      description: Returns details about the specified database.
      tags:
        - Databases
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateDatabase
      summary: Update a database
      description: Updates the specified database.
      tags:
        - Databases
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatabaseDetails'
      responses:
        '200':
          description: Database update initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteDatabase
      summary: Delete a database
      description: Deletes the specified database.
      tags:
        - Databases
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /dbHomes:
    get:
      operationId: listDbHomes
      summary: List Database Homes
      description: Returns a list of Database Homes in the specified compartment.
      tags:
        - Database Homes
      parameters:
        - $ref: '#/components/parameters/compartmentIdParam'
        - name: dbSystemId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Database Homes listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DbHomeSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createDbHome
      summary: Create a Database Home
      description: Creates a new Database Home in the specified DB System.
      tags:
        - Database Homes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDbHomeDetails'
      responses:
        '200':
          description: Database Home creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbHome'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /dbHomes/{dbHomeId}:
    get:
      operationId: getDbHome
      summary: Get a Database Home
      description: Returns details about the specified Database Home.
      tags:
        - Database Homes
      parameters:
        - name: dbHomeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database Home details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DbHome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteDbHome
      summary: Delete a Database Home
      description: Deletes the specified Database Home.
      tags:
        - Database Homes
      parameters:
        - name: dbHomeId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /backups:
    get:
      operationId: listBackups
      summary: List database backups
      description: Returns a list of backups for a database or compartment.
      tags:
        - Backups
      parameters:
        - name: databaseId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/compartmentIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Backups listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BackupSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createBackup
      summary: Create a database backup
      description: Creates a new backup for the specified database.
      tags:
        - Backups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackupDetails'
      responses:
        '200':
          description: Backup creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backup'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /backups/{backupId}:
    get:
      operationId: getBackup
      summary: Get a database backup
      description: Returns details about the specified backup.
      tags:
        - Backups
      parameters:
        - name: backupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteBackup
      summary: Delete a database backup
      description: Deletes the specified backup.
      tags:
        - Backups
      parameters:
        - name: backupId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /dataGuardAssociations:
    get:
      operationId: listDataGuardAssociations
      summary: List Data Guard associations
      description: Returns Data Guard associations for the specified database.
      tags:
        - Data Guard
      parameters:
        - name: databaseId
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Data Guard associations listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataGuardAssociationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /pluggableDatabases:
    get:
      operationId: listPluggableDatabases
      summary: List pluggable databases
      description: Returns a list of pluggable databases.
      tags:
        - Pluggable Databases
      parameters:
        - $ref: '#/components/parameters/compartmentIdParam'
        - name: databaseId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Pluggable databases listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PluggableDatabaseSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createPluggableDatabase
      summary: Create a pluggable database
      description: Creates a new pluggable database.
      tags:
        - Pluggable Databases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePluggableDatabaseDetails'
      responses:
        '200':
          description: Pluggable database creation initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluggableDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /pluggableDatabases/{pluggableDatabaseId}:
    get:
      operationId: getPluggableDatabase
      summary: Get a pluggable database
      description: Returns details about the specified pluggable database.
      tags:
        - Pluggable Databases
      parameters:
        - name: pluggableDatabaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pluggable database details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluggableDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePluggableDatabase
      summary: Update a pluggable database
      description: Updates the specified pluggable database.
      tags:
        - Pluggable Databases
      parameters:
        - name: pluggableDatabaseId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePluggableDatabaseDetails'
      responses:
        '200':
          description: Pluggable database updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluggableDatabase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePluggableDatabase
      summary: Delete a pluggable database
      description: Deletes the specified pluggable database.
      tags:
        - Pluggable Databases
      parameters:
        - name: pluggableDatabaseId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '202':
          description: Deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
